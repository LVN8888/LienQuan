<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tính Tỉ Lệ Thắng Liên Quân</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="mystyle.css" />
</head>
<body>
  <main class="page">
    <section class="calculator-card">
      <div class="card-top">
        <span class="eyebrow">Web Tool</span>
        <h1>Tính Tỉ Lệ Thắng Liên Quân</h1>
        <p class="description">
          Nhập tỉ lệ thắng hiện tại, tỉ lệ thắng mong muốn và tổng số trận đã chơi
          để tính số trận cần thắng hoặc thua liên tiếp.
        </p>
      </div>

      <div class="form-grid">
        <div class="input-group">
          <label for="win_now">Tỉ lệ thắng hiện tại (%)</label>
          <input
            type="text"
            id="win_now"
            placeholder="Ví dụ: 54.7"
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label for="win_need">Tỉ lệ thắng mong muốn (%)</label>
          <input
            type="text"
            id="win_need"
            placeholder="Ví dụ: 60"
            autocomplete="off"
          />
        </div>

        <div class="input-group full-width">
          <label for="n">Tổng số trận đã chơi</label>
          <input
            type="text"
            id="n"
            placeholder="Ví dụ: 1200"
            autocomplete="off"
          />
        </div>
      </div>

      <div class="action-row">
        <button id="calcButton" type="button" class="btn btn-primary">
          Tính kết quả
        </button>
        <button id="resetButton" type="button" class="btn btn-secondary">
          Làm mới
        </button>
      </div>

      <div id="output" class="result-box result-empty">
        Kết quả sẽ hiển thị tại đây.
      </div>
    </section>
  </main>

  <script src="myscript.js"></script>
</body>
</html>
